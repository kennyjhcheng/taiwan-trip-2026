<!DOCTYPE html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; overflow: hidden; }

    #header {
      padding: 8px 16px 6px;
      background: #16213e;
      border-bottom: 2px solid #0f3460;
    }

    /* Row 1: title + legend + toggles */
    #header-row1 {
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    /* Row 2: date filter */
    #header-row2 {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 7px;
      overflow-x: auto;
      padding-bottom: 2px;
      scrollbar-width: thin;
      scrollbar-color: #334 transparent;
    }
    #header-row2::-webkit-scrollbar { height: 4px; }
    #header-row2::-webkit-scrollbar-track { background: transparent; }
    #header-row2::-webkit-scrollbar-thumb { background: #334; border-radius: 2px; }

    #header h1 { font-size: 16px; font-weight: 700; color: #fff; white-space: nowrap; }
    #header .subtitle { font-size: 10px; color: #aaa; margin-top: 1px; }

    .legend-section { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; }
    .legend-label {
      font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em;
      color: #778; margin-right: 1px; white-space: nowrap; flex-shrink: 0;
    }
    .legend-divider { width: 1px; height: 24px; background: #334; margin: 0 3px; flex-shrink: 0; }

    .type-badge {
      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: #ddd; padding: 2px 7px;
      border-radius: 20px; border: 1.5px solid; white-space: nowrap;
    }
    .type-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

    /* Route toggle buttons */
    .route-toggle {
      display: flex; align-items: center; gap: 5px;
      font-size: 11px; color: #ccc; padding: 3px 10px;
      border-radius: 20px; cursor: pointer; white-space: nowrap;
      transition: all 0.2s; user-select: none;
    }
    .route-toggle.active { opacity: 1; }
    .route-toggle.inactive { opacity: 0.35; }
    .route-line { width: 22px; height: 4px; border-radius: 2px; flex-shrink: 0; }
    .route-line.dashed {
      background: repeating-linear-gradient(90deg, currentColor 0, currentColor 6px, transparent 6px, transparent 11px);
    }
    .route-line.dotted {
      background: repeating-linear-gradient(90deg, currentColor 0, currentColor 3px, transparent 3px, transparent 8px);
    }

      display: flex; align-items: center; gap: 4px;
      font-size: 11px; color: #ccc;
      background: rgba(255,255,255,0.07); padding: 2px 8px;
      border-radius: 20px; cursor: pointer; white-space: nowrap;
      border: 1px solid transparent; transition: all 0.2s; user-select: none;

    .city-toggle.active { border-color: rgba(255,255,255,0.22); }
    .city-toggle.inactive { opacity: 0.35; }
    .city-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

      padding: 4px 11px; border-radius: 8px; cursor: pointer;
      border: 1.5px solid #445; background: transparent;
      color: #aaa; font-size: 11px; font-weight: 700;
      transition: all 0.15s; user-select: none; white-space: nowrap;

    .date-pill-all:hover { background: rgba(255,255,255,0.1); }
    .date-pill-all.active { background: #3b82f6; border-color: #60a5fa; color: #fff; }

    .date-pill {
      display: flex; flex-direction: column; align-items: center;
      padding: 3px 7px; border-radius: 8px; cursor: pointer;
      border: 1.5px solid #334; background: transparent;
      color: #667; font-size: 9px; line-height: 1.3;
      transition: all 0.15s; user-select: none; white-space: nowrap;

    .date-pill.has-items { color: #ccc; border-color: #4a5568; }
    .date-pill.has-route { border-color: #4a6741; }
    .date-pill.has-items.has-route { border-color: #4a6741; }

    .date-pill.active .dp-dot { background: #fff; }

    .popup-link {

// ────────────────────────────────────────────────────────────────────────────
// PARSE ITIN → DATE ARRAY
// ────────────────────────────────────────────────────────────────────────────
function parseItinDates(itin) {
  if (!itin) return [];
  // Strip parenthetical notes like "(on-route)", "(brief stop)"
  let s = itin.replace(/\([^)]*\)/g, '').trim();
  // Strip "Trip N, " prefix
  s = s.replace(/^Trip \d+,\s*/i, '').trim();
  // Handle ranges: "May 1–2" or "May 1-2"
  const rangeMatch = s.match(/^((?:Apr|May)\s+\d+)\s*[–\-]\s*(\d+)$/);
  if (rangeMatch) {
    const month = rangeMatch[1].split(' ')[0];
    const start = parseInt(rangeMatch[1].split(' ')[1], 10);
    const end   = parseInt(rangeMatch[2], 10);
    const dates = [];
    for (let d = start; d <= end; d++) dates.push(`${month} ${d}`);
    return dates;
  }
  return [s];
}

// ────────────────────────────────────────────────────────────────────────────
// MARKER ICON
// ────────────────────────────────────────────────────────────────────────────
function makeIcon(typeStr, pri) {
  const { color, emoji } = getPinStyle(typeStr);
  const size     = pri === '🔥' ? 36 : pri === '✨' ? 28 : 22;
  const fontSize = pri === '🔥' ? 16 : pri === '✨' ? 13 : 10;
  const border   = pri === '🔥' ? '2.5px solid rgba(255,255,255,0.95)' : '2px solid rgba(255,255,255,0.75)';
  const shadow   = pri === '🔥'
    ? '0 3px 10px rgba(0,0,0,0.5), 0 0 0 2px rgba(255,255,255,0.2)'
    : '0 2px 6px rgba(0,0,0,0.4)';
  return L.divIcon({
    className: '',
    html: `<div style="width:${size}px;height:${size}px;background:${color};border-radius:50%;border:${border};box-shadow:${shadow};display:flex;align-items:center;justify-content:center;font-size:${fontSize}px;line-height:1;">${emoji}</div>`,
    iconSize: [size, size],
    iconAnchor: [size/2, size/2],
    popupAnchor: [0, -(size/2 + 6)]
  });
}

// ────────────────────────────────────────────────────────────────────────────
// POPUP CONTENT
// ────────────────────────────────────────────────────────────────────────────
function makePopup(p) {
  const city  = CITIES[p.city];
  const { color } = getPinStyle(p.type);
  const isScheduled = !!p.itin;
  const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(p.name + ' ' + p.addr)}`;
  return `
    <div class="popup-header" style="background:${color}">${p.name}</div>
    <div class="popup-body">
      <div class="popup-meta">
        <span class="popup-badge">${p.pri} ${PRI_LABEL[p.pri]}</span>
        <span class="popup-badge">${p.type}</span>
        <span class="popup-badge">${city.emoji} ${city.label}</span>
      </div>
      <div class="popup-address">📍 ${p.addr}</div>
      <div class="popup-itinerary ${isScheduled ? 'scheduled' : ''}">
        ${isScheduled ? '✅ On itinerary: ' + p.itin : '— Not yet scheduled'}
      </div>
      <a href="${mapsUrl}" target="_blank" class="popup-link">Open in Google Maps ↗</a>
    </div>`;
}

// ────────────────────────────────────────────────────────────────────────────
// STATE
// ────────────────────────────────────────────────────────────────────────────
const cityActive   = {};     // city key → bool
const routeActive  = {};     // route type key → bool
let   selectedDate = null;   // null = all dates

// Pre-compute date sets
const placeDates = places.map(p => parseItinDates(p.itin));  // array of date arrays
const routeDates = routes.map(r => r.date);                   // string per route

// Dates that have scheduled items or routes
const datesWithItems = new Set();
places.forEach(p => { parseItinDates(p.itin).forEach(d => datesWithItems.add(d)); });
const datesWithRoutes = new Set(routes.map(r => r.date));

// ────────────────────────────────────────────────────────────────────────────
// BUILD MARKERS
// ────────────────────────────────────────────────────────────────────────────
const markerObjects = places.map((p, i) => {
  const m = L.marker([p.lat, p.lng], { icon: makeIcon(p.type, p.pri) })
    .bindPopup(makePopup(p), { maxWidth: 310 });
  m.addTo(map);
  return { marker: m, city: p.city, dates: placeDates[i] };
});

// ────────────────────────────────────────────────────────────────────────────
// BUILD ROUTE POLYLINES
// ────────────────────────────────────────────────────────────────────────────
const routeObjects = routes.map(r => {
  const cfg = ROUTE_TYPES[r.type];
  const poly = L.polyline(r.coords, {
    color: cfg.color,
    weight: cfg.weight,
    opacity: cfg.opacity,
    dashArray: cfg.dashArray,
    lineJoin: 'round',
    lineCap: 'round',
  });
  poly.bindPopup(`
    <div class="route-popup-wrap">
      <div class="route-popup-head" style="background:${cfg.color}">${r.label}</div>
      <div class="route-popup-body">${r.detail}</div>
    </div>`, { maxWidth: 280 });
  poly.addTo(map);
  return { polyline: poly, type: r.type, date: r.date };
});

// ────────────────────────────────────────────────────────────────────────────
// VISIBILITY UPDATE
// ────────────────────────────────────────────────────────────────────────────
function updateVisibility() {
  markerObjects.forEach(({ marker, city, dates }) => {
    const cityOk = cityActive[city] !== false;
    const dateOk = !selectedDate || dates.includes(selectedDate);
    if (cityOk && dateOk) {
      if (!map.hasLayer(marker)) marker.addTo(map);
    } else {
      if (map.hasLayer(marker)) map.removeLayer(marker);
    }
  });
  routeObjects.forEach(({ polyline, type, date }) => {
    const typeOk = routeActive[type] !== false;
    const dateOk = !selectedDate || date === selectedDate;
    if (typeOk && dateOk) {
      if (!map.hasLayer(polyline)) polyline.addTo(map);
    } else {
      if (map.hasLayer(polyline)) map.removeLayer(polyline);
    }
  });
}

// ────────────────────────────────────────────────────────────────────────────
// BUILD CITY TOGGLES
// ────────────────────────────────────────────────────────────────────────────
const toggleContainer = document.getElementById('city-toggles');
Object.entries(CITIES).forEach(([key, city]) => {
  cityActive[key] = true;
  const btn = document.createElement('div');
  btn.className = 'city-toggle active';
  btn.innerHTML = `<div class="city-dot" style="background:${city.color}"></div>${city.emoji} ${city.label}`;
  btn.addEventListener('click', () => {
    cityActive[key] = !cityActive[key];
    btn.classList.toggle('active', cityActive[key]);
    btn.classList.toggle('inactive', !cityActive[key]);
    updateVisibility();
  });
  toggleContainer.appendChild(btn);
});

// ────────────────────────────────────────────────────────────────────────────
// BUILD ROUTE TOGGLES
// ────────────────────────────────────────────────────────────────────────────
const routeToggleContainer = document.getElementById('route-toggles');
Object.entries(ROUTE_TYPES).forEach(([key, rt]) => {
  routeActive[key] = true;
  const btn = document.createElement('div');
  btn.className = 'route-toggle active';
  btn.style.cssText = `border: 1.5px solid ${rt.color}33; color: ${rt.color};`;

  // Build line preview based on dash style
  let lineStyle = `background:${rt.color};`;
  if (rt.dashArray === '10,6') {
    lineStyle = `background: repeating-linear-gradient(90deg,${rt.color} 0,${rt.color} 6px,transparent 6px,transparent 11px);`;
  } else if (rt.dashArray === '4,8') {
    lineStyle = `background: repeating-linear-gradient(90deg,${rt.color} 0,${rt.color} 3px,transparent 3px,transparent 8px);`;
  }
  btn.innerHTML = `<div class="route-line" style="${lineStyle}height:4px;width:22px;border-radius:2px;flex-shrink:0;"></div>${rt.label}`;

  btn.addEventListener('click', () => {
    routeActive[key] = !routeActive[key];
    btn.classList.toggle('active', routeActive[key]);
    btn.classList.toggle('inactive', !routeActive[key]);
    updateVisibility();
  });
  routeToggleContainer.appendChild(btn);
});

// ────────────────────────────────────────────────────────────────────────────
// BUILD DATE PILLS
// ────────────────────────────────────────────────────────────────────────────
const datePillsContainer = document.getElementById('date-pills');
const datePillEls = {};

TRIP_DATES.forEach(d => {
  const hasItems  = datesWithItems.has(d.key);
  const hasRoute  = datesWithRoutes.has(d.key);
  const pill = document.createElement('div');
  pill.className = 'date-pill' +
    (hasItems  ? ' has-items'  : '') +
    (hasRoute  ? ' has-route'  : '');
  pill.innerHTML = `
    <span class="dp-month">${d.month}</span>
    <span class="dp-day">${d.day}</span>
    <span class="dp-wd">${d.wd}</span>
    <div class="dp-dot"></div>`;
  pill.title = d.key + (hasItems ? ' — has scheduled items' : '') + (hasRoute ? ' · has route' : '');
  pill.addEventListener('click', () => selectDate(d.key));
  datePillsContainer.appendChild(pill);
  datePillEls[d.key] = pill;
});

// "All" button
document.getElementById('date-all-btn').addEventListener('click', () => selectDate(null));

function selectDate(dateKey) {
  selectedDate = dateKey;
  // Update "All" button
  document.getElementById('date-all-btn').classList.toggle('active', !dateKey);
  // Update date pills
  TRIP_DATES.forEach(d => {
    datePillEls[d.key].classList.toggle('active', d.key === dateKey);
  });
  updateVisibility();
  // If a date is selected, zoom to relevant content
  if (dateKey) {
    const visible = markerObjects.filter(({ city, dates }) =>
      cityActive[city] !== false && dates.includes(dateKey)
    );
    const visibleRoutes = routeObjects.filter(({ type, date }) =>
      routeActive[type] !== false && date === dateKey
    );
    let bounds = null;
    if (visible.length > 0 || visibleRoutes.length > 0) {
      const latLngs = [
        ...visible.map(({ marker }) => marker.getLatLng()),
        ...visibleRoutes.flatMap(({ polyline }) => polyline.getLatLngs()),
      ];
      bounds = L.latLngBounds(latLngs);
    }
    if (bounds && bounds.isValid()) {
      map.fitBounds(bounds, { padding: [50, 50], maxZoom: 13 });
    }
  }
}

// ────────────────────────────────────────────────────────────────────────────
// INIT
// ────────────────────────────────────────────────────────────────────────────
resizeMap();
updateVisibility();
</script>
</body>
</html>
