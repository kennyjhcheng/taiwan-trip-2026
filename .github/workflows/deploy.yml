name: Build & Deploy to GitHub Pages

# Trigger on every push to main, or manually from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow the workflow to write to the gh-pages branch
permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Check out source ────────────────────────────────────────────────
      - name: Checkout main
        uses: actions/checkout@v4

      # ── 2. Python ──────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: pip install pyyaml

      # ── 3. Regenerate locations.json from activity frontmatter ─────────────
      - name: Regenerate locations.json
        run: python3 scripts/generate_map_data.py

      # ── 4. Convert [[wikilinks]] + dataview blocks → standard markdown ──────
      - name: Convert wikilinks for GitHub Pages
        run: python3 scripts/convert_wikilinks.py --src . --out _ghpages_build

      # ── 5. Deploy build output to gh-pages branch ──────────────────────────
      #
      # GitHub Pages will then run Jekyll (with jekyll-relative-links enabled
      # by default) on the gh-pages branch, which converts the .md relative
      # links we generated into correct .html URLs.
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_ghpages_build
          publish_branch: gh-pages
          force_orphan: true
          user_name: 'github-actions[bot]'
          user_email: 'github-actions[bot]@users.noreply.github.com'
          commit_message: 'deploy: ${{ github.event.head_commit.message }}'
